# Shared proxy cache for the public, anonymous read endpoints of the API.
#
# Lives here rather than in the server block because proxy_cache_path is only
# valid in nginx's http context. Deployed to /etc/nginx/conf.d/api-cache.conf,
# which nginx.conf already includes.
#
# Why: Django caches the *data* for these endpoints (60s), but every request still
# paid to re-render 225 KB of JSON and re-gzip it. Under load that was the whole
# bottleneck — /api/games/ hit a p95 of 18s at 40 concurrent. Caching the rendered
# response means that work happens once per minute instead of once per request.
#
# Only the public browse endpoints are cached, and only via their own location
# blocks in gamesbazaar.conf — authenticated endpoints cannot reach this cache.

proxy_cache_path /var/cache/nginx/api
                 levels=1:2
                 keys_zone=api_cache:10m
                 max_size=200m
                 inactive=10m
                 use_temp_path=off;
