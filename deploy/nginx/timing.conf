# Request-timing access log (lives in conf.d so log_format sits in http{}).
# rt  = total time nginx spent on the request (includes sending to client)
# urt = time the upstream (Next.js or daphne) took to answer
# A slow page with high urt is a backend problem; high rt but low urt is the
# network path or the client. Added 2026-07-18 while chasing intermittent
# logged-in slowness reports.
log_format timing '$remote_addr [$time_local] "$request" $status '
                  '$body_bytes_sent rt=$request_time urt=$upstream_response_time '
                  'cache=$upstream_cache_status';
