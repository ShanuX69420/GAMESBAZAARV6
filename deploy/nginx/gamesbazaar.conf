server {
    server_name gamesbazaar.pk;
    return 301 https://www.gamesbazaar.pk$request_uri;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gamesbazaar.pk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gamesbazaar.pk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    server_name www.gamesbazaar.pk;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gamesbazaar.pk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gamesbazaar.pk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    server_name api.gamesbazaar.pk;

    client_max_body_size 10m;

    location /static/ {
        alias /opt/gamesbazaar/app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/game_icons/ {
        alias /opt/gamesbazaar/app/backend/media/game_icons/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/avatars/ {
        alias /opt/gamesbazaar/app/backend/media/avatars/;
        expires 1h;
        add_header Cache-Control "private, max-age=3600";
    }

    location /media/ {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gamesbazaar.pk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gamesbazaar.pk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = gamesbazaar.pk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name gamesbazaar.pk;
    return 404; # managed by Certbot


}

server {
