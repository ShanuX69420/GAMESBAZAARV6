server {
    server_name gamesbazaar.pk;
    return 301 https://www.gamesbazaar.pk$request_uri;

    listen [::]:443 ssl http2 ipv6only=on; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gamesbazaar.pk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gamesbazaar.pk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    server_name www.gamesbazaar.pk;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gamesbazaar.pk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gamesbazaar.pk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    server_name api.gamesbazaar.pk;

    client_max_body_size 10m;

    # Compress API responses. Next.js gzips its own HTML, but Django does not, and
    # nginx's default gzip_types is text/html only — so every JSON response was
    # shipped raw (/api/games/ was 225 KB on the wire, 34 KB gzipped). Level 5 rather
    # than 6: nginx re-compresses on every request, and the extra ratio isn't worth
    # the CPU on a 1-vCPU box.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain text/xml application/xml;

    location /static/ {
        alias /opt/gamesbazaar/app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/game_icons/ {
        alias /opt/gamesbazaar/app/backend/media/game_icons/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/avatars/ {
        alias /opt/gamesbazaar/app/backend/media/avatars/;
        expires 1h;
        add_header Cache-Control "private, max-age=3600";
    }

    location /media/ {
        return 404;
    }

    # Public browse endpoints (game list, game detail, category listings, home
    # panels). Django already marks these "Cache-Control: public, max-age=..."; it
    # caches the DATA but still re-rendered the JSON and re-gzipped it on every
    # request, which is what pinned the CPU under load. nginx now honours that
    # header and serves the finished response, so the work happens once per cache
    # window instead of once per request.
    #
    # Only these paths get a cache, so authenticated endpoints cannot reach it.
    # No proxy_cache_valid is set on purpose: nginx caches strictly according to
    # the upstream's Cache-Control, so a response Django does not mark public is
    # never stored.
    location ~ ^/api/(games/|home/popular/) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_lock on;          # on expiry ONE request refills; the rest wait
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        # Belt and braces: never serve a cached body to a logged-in caller, and
        # never store one of their responses. Auth arrives as a Bearer header OR
        # the gb_access_token cookie (the browser frontend only uses the cookie),
        # so bypass on both — a bypass on the header alone never fires for real users.
        proxy_cache_bypass $http_authorization$cookie_gb_access_token;
        proxy_no_cache     $http_authorization$cookie_gb_access_token;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gamesbazaar.pk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gamesbazaar.pk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
